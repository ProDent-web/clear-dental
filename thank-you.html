<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="robots" content="noindex" />
  <title>Thank You — Clear Dental | Centreville, VA</title>
  <meta name="description" content="Thank you for contacting Clear Dental. We'll be in touch within one business day." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
</head>
<body data-page="contact">

  <header class="nav" id="nav-mount"></header>
  <div class="mobile-menu" id="mobile-menu-mount" aria-hidden="true"></div>

  <main>
    <section class="page-hero page-hero--center" style="min-height: 88vh; display: flex; align-items: center;">
      <div class="page-hero__bg"></div>
      <div class="container page-hero__inner">

        <div class="thankyou__check" aria-hidden="true">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>

        <span class="eyebrow reveal" style="justify-content: center;">
          <span class="eyebrow__dot"></span>
          Request Received
        </span>
        <h1 class="page-hero__title reveal">Thank you.<br /><em>We'll be in touch.</em></h1>
        <p class="page-hero__lead reveal">We've received your request and a member of our team will reach out within one business day. If it's urgent, give us a call and we'll help right away.</p>

        <div class="hero__actions reveal" style="justify-content: center; margin-top: 2.5rem;">
          <a href="tel:+17038885005" class="btn btn--ghost btn--large">Call 703-888-5005</a>
          <a href="index.html" class="btn btn--primary btn--large">Back to Home</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer" id="footer-mount"></footer>
  <script src="partials.js"></script>
  <script src="script.js"></script>
</body>
</html>
